# LEGACY: use docker-compose.prod.yml with start-final.ps1 instead.
services:
  postgres:
    image: postgres:16
    container_name: attendance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: attendance_db
      POSTGRES_USER: attendance_user
      POSTGRES_PASSWORD: attendance_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
