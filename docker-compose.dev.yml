# LEGACY: use docker-compose.prod.yml with start-final.ps1 instead.
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: attendance_db
      POSTGRES_USER: attendance_user
      POSTGRES_PASSWORD: attendance_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Use 5433 so we never conflict with other local Postgres/Docker stacks.
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attendance_user -d attendance_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # Backend runs on 3001 to avoid collisions with other stacks.
      PORT: "3001"
      FRONTEND_ORIGINS: "http://localhost:5173,http://localhost:5174"
      DATABASE_URL: "postgresql://attendance_user:attendance_pass@postgres:5432/attendance_db?schema=public"
      JWT_SECRET: "change-this-in-production"
      JWT_EXPIRES_IN: "7d"
      DEVICE_PUNCH_MODE: "BIOMETRIC_ONLY"
      ADMIN_EMAIL: "admin@rcc.local"
      ADMIN_PASSWORD: "admin123"
      ADMIN_NAME: "RCC Admin"
    ports:
      - "3001:3001"

volumes:
  postgres_data:
